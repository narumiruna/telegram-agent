services:
  telegramagent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.14"
    image: telegramagent:local
    env_file:
      - .env
    command: ["--verbose"]
    user: "0:0"
    environment:
      HOME: /tmp
      BOT_CONTAINER_TOOLS_ENABLED: ${BOT_CONTAINER_TOOLS_ENABLED:-true}
      BOT_CONTAINER_TOOLS_ROOT: ${BOT_CONTAINER_TOOLS_ROOT:-/app}
    init: true
    restart: unless-stopped
    volumes:
      - ./.agents:/app/.agents
      - ./.events:/app/.events
      - ./.telegramagent:/app/.telegramagent
      - ./SOUL.md:/app/SOUL.md:ro
      - ./BOT_MEMORY.md:/app/BOT_MEMORY.md:ro
