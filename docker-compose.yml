services:
  telegramagent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.14"
    image: telegramagent:local
    env_file:
      - .env
    command: ["--verbose"]
    user: "0:0"
    environment:
      HOME: /tmp
    init: true
    restart: unless-stopped
    volumes:
      - ./.agents:/app/.agents
      # Uncomment these for live host edits without rebuilding the image.
      # - ./SOUL.md:/app/SOUL.md:ro
      # - ./MEMORY.md:/app/MEMORY.md:ro
